<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>관리자 로그인 | JIAN Portfolio</title>

    <link rel="stylesheet"
          th:href="@{/css/admin.css}">
</head>

<body class="admin-login-page">

    <main class="admin-login-main">

        <section class="admin-login-card">

            <a th:href="@{/}"
               class="admin-logo">
                JIAN<span>.</span>
            </a>

            <div class="admin-login-heading">
                <span>ADMIN</span>
                <h1>관리자 로그인</h1>

                <p>
                    포트폴리오 문의 내역을 확인하려면<br>
                    관리자 계정으로 로그인해주세요.
                </p>
            </div>

            <div th:if="${param.error}"
                 class="admin-alert admin-alert-error">
                아이디 또는 비밀번호가 올바르지 않습니다.
            </div>

            <div th:if="${param.logout}"
                 class="admin-alert admin-alert-success">
                정상적으로 로그아웃되었습니다.
            </div>

            <form th:action="@{/admin/login}"
                  method="post"
                  class="admin-login-form">

                <div class="admin-form-group">
                    <label for="username">
                        아이디
                    </label>

                    <input type="text"
                           id="username"
                           name="username"
                           placeholder="관리자 아이디"
                           autocomplete="username"
                           required>
                </div>

                <div class="admin-form-group">
                    <label for="password">
                        비밀번호
                    </label>

                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="관리자 비밀번호"
                           autocomplete="current-password"
                           required>
                </div>

                <button type="submit"
                        class="admin-primary-button">
                    로그인 →
                </button>

            </form>

            <a th:href="@{/}"
               class="admin-back-link">
                ← 포트폴리오로 돌아가기
            </a>

        </section>

    </main>

</body>
</html>
